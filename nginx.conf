# Nginx como reverse proxy na frente de site e admin
# Roteamento por subdomínio:
#   dominio.com         → site (porta 3000)
#   app.dominio.com     → admin (porta 3001)
#   api.dominio.com     → api (porta 3000 do backend)

upstream site_upstream {
    server site:3000;
}

upstream admin_upstream {
    server admin:3001;
}

upstream api_upstream {
    server api:3000;
}

# Site público
server {
    listen 80;
    server_name localhost dominio.com www.dominio.com;

    location / {
        proxy_pass http://site_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    location /_next/static {
        proxy_pass http://site_upstream;
        proxy_cache_bypass $http_upgrade;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}

# Painel administrativo
server {
    listen 80;
    server_name app.dominio.com;

    location / {
        proxy_pass http://admin_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    location /_next/static {
        proxy_pass http://admin_upstream;
        proxy_cache_bypass $http_upgrade;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}

# API backend
server {
    listen 80;
    server_name api.dominio.com;

    location / {
        proxy_pass http://api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
